<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedEcos - Select Portal</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            text-align: center;
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }
        .portal-card {
            background: #ffffff;
            border: 2px solid #e0e6ed;
            border-radius: 12px;
            padding: 30px 20px;
            text-decoration: none;
            color: #2c3e50;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .portal-card:hover {
            border-color: #3498db;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.2);
            transform: translateY(-5px);
        }
        .icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to MedEcos</h1>
        <p>Select your portal to continue</p>
        
        <div class="portal-grid">
            <a href="http://localhost:3001" target="_blank" class="portal-card">
                <div class="icon">🧑‍⚕️</div>
                Patient Portal
            </a>
            <a href="http://localhost:3002" target="_blank" class="portal-card">
                <div class="icon">🩺</div>
                Doctor Portal
            </a>
            <a href="http://localhost:3003" target="_blank" class="portal-card">
                <div class="icon">💊</div>
                Pharmacist Portal
            </a>
        </div>
    </div>
</body>
</html>
