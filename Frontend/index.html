<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedEcos — Unified Health Portal</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #090f11;
            --bg-secondary: #0d171a;
            --bg-card: rgba(13, 23, 26, 0.7);
            --border-color: rgba(0, 150, 136, 0.15);
            --border-focus: rgba(0, 188, 212, 0.4);
            --text-primary: #f1f8f6;
            --text-secondary: #8e9fa2;
            --teal: #009688;
            --teal-light: #4db6ac;
            --accent: #00bcd4;
            --accent-glow: rgba(0, 188, 212, 0.15);
            --error: #ef5350;
            --error-glow: rgba(239, 83, 80, 0.15);
            --success: #66bb6a;
            --success-glow: rgba(102, 187, 106, 0.15);
            --warning: #ffa726;
            --warning-glow: rgba(255, 167, 38, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
        }

        /* Glassmorphism Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 150, 136, 0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--teal);
        }

        /* Header Style */
        header {
            background-color: rgba(9, 15, 17, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 28px;
            background: linear-gradient(135deg, var(--teal), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 188, 212, 0.3);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--accent);
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.02);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--warning);
            box-shadow: 0 0 10px var(--warning);
            transition: all 0.3s;
        }

        .status-indicator.online {
            background-color: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .user-nav-profile {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid rgba(239, 83, 80, 0.3);
            color: var(--error);
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: var(--error);
            color: white;
            box-shadow: 0 0 15px var(--error-glow);
        }

        /* Container & Grid Styling */
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 24px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Authentication Views */
        .auth-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            backdrop-filter: blur(15px);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-title {
            font-size: 28px;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, white, var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 32px;
        }

        /* Role Selector Tabs */
        .role-tabs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .role-tab {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 600;
            padding: 8px 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .role-tab:hover {
            color: var(--text-primary);
        }

        .role-tab.active {
            background-color: var(--teal);
            color: white;
            box-shadow: 0 4px 12px rgba(0, 150, 136, 0.3);
        }

        /* Forms Styling */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 16px;
            font-family: inherit;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--teal), var(--accent));
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-family: inherit;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(0, 188, 212, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(0, 188, 212, 0.35);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .auth-toggle {
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 20px;
            cursor: pointer;
            text-decoration: underline;
        }

        .auth-toggle:hover {
            color: var(--text-primary);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 16px 24px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-icon {
            font-size: 18px;
        }

        /* Dashboard Common Grid Layout */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 32px;
            animation: fadeIn 0.4s ease-out;
            align-items: start;
        }

        /* Sidebar Styling */
        .sidebar {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-user {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-user-name {
            font-size: 16px;
            font-weight: 700;
            word-break: break-all;
        }

        .sidebar-user-role {
            font-size: 11px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .sidebar-menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .sidebar-menu-item:hover {
            background-color: rgba(255, 255, 255, 0.02);
            color: var(--text-primary);
        }

        .sidebar-menu-item.active {
            background-color: rgba(0, 150, 136, 0.1);
            color: var(--teal-light);
            border-left: 3px solid var(--teal);
        }

        /* Dashboard Panels */
        .dashboard-panel {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 32px;
            min-height: 500px;
        }

        .panel-header {
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            font-size: 24px;
            font-weight: 700;
        }

        /* Statistics Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-card-title {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
        }

        .stat-card-value {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, white, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Timeline and Medical History */
        .timeline {
            position: relative;
            padding-left: 20px;
            border-left: 2px solid rgba(0, 150, 136, 0.15);
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .timeline-item {
            position: relative;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -27px;
            top: 4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--teal);
            border: 3px solid var(--bg-primary);
            box-shadow: 0 0 10px var(--teal);
        }

        .timeline-date {
            font-size: 12px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .timeline-card {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s;
        }

        .timeline-card:hover {
            background-color: rgba(255, 255, 255, 0.04);
            border-color: rgba(0, 188, 212, 0.15);
        }

        .timeline-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timeline-doctor {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        /* Medicine Lists */
        .med-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }

        .med-tag {
            background-color: rgba(0, 150, 136, 0.08);
            border: 1px solid rgba(0, 150, 136, 0.2);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 12px;
            color: var(--teal-light);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .med-tag .freq {
            color: var(--accent);
            font-weight: 700;
            font-size: 10px;
        }

        .med-tag .duration {
            opacity: 0.6;
            font-size: 10px;
        }

        .tests-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .test-tag {
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Cryptographic Verification Banners */
        .verification-bar {
            background-color: var(--success-glow);
            border: 1px solid rgba(102, 187, 106, 0.2);
            border-radius: 8px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--success);
            cursor: pointer;
            transition: all 0.2s;
        }

        .verification-bar:hover {
            background-color: rgba(102, 187, 106, 0.25);
        }

        .verification-bar.error {
            background-color: var(--error-glow);
            border-color: rgba(239, 83, 80, 0.2);
            color: var(--error);
        }

        /* Dynamic Digital Signature View */
        .signature-block {
            background: #000;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 10px;
            color: var(--text-secondary);
            word-break: break-all;
            margin-top: 12px;
            max-height: 80px;
            overflow-y: auto;
        }

        /* Prescription Creator Layout */
        .pres-form-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
        }

        .medicine-builder-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
        }

        .med-row-input {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 8px;
            margin-bottom: 12px;
        }

        .add-med-btn {
            background: var(--teal);
            border: none;
            color: white;
            border-radius: 6px;
            width: 38px;
            height: 38px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-med-btn:hover {
            background: var(--teal-light);
        }

        .med-builder-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 12px;
        }

        .med-builder-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .remove-med-btn {
            background: transparent;
            border: none;
            color: var(--error);
            cursor: pointer;
            font-size: 16px;
        }

        /* Checkbox lists */
        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .checkbox-item input {
            accent-color: var(--teal);
        }

        /* Patient Card layout */
        .patient-card {
            background: linear-gradient(135deg, #0d262a 0%, #081517 100%);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border-top: 4px solid var(--teal);
        }

        .qr-placeholder {
            background: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .patient-title {
            font-size: 20px;
            font-weight: 700;
        }

        .patient-abha {
            font-family: monospace;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            color: var(--accent);
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .patient-details {
            width: 100%;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .patient-details span strong {
            color: var(--text-primary);
        }

        /* Lab Orders Board */
        .lab-board {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .lab-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lab-item-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .lab-item-title {
            font-size: 16px;
            font-weight: 700;
        }

        .lab-item-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .lab-status-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .lab-status-badge.pending {
            background-color: var(--warning-glow);
            border: 1px solid rgba(255, 167, 38, 0.2);
            color: var(--warning);
        }

        .lab-status-badge.inprogress {
            background-color: var(--accent-glow);
            border: 1px solid rgba(0, 188, 212, 0.2);
            color: var(--accent);
        }

        .lab-status-badge.completed {
            background-color: var(--success-glow);
            border: 1px solid rgba(102, 187, 106, 0.2);
            color: var(--success);
        }

        .lab-actions {
            display: flex;
            gap: 8px;
        }

        .lab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lab-btn:hover {
            background: var(--teal);
            border-color: var(--teal);
            box-shadow: 0 0 10px rgba(0, 150, 136, 0.3);
        }

        /* AI Interaction clash warnings styling */
        .ai-warning-box {
            background-color: var(--warning-glow);
            border: 1px solid rgba(255, 167, 38, 0.25);
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            display: flex;
            gap: 12px;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { border-color: rgba(255, 167, 38, 0.25); }
            to { border-color: rgba(255, 167, 38, 0.5); }
        }

        .ai-warning-icon {
            font-size: 24px;
        }

        .ai-warning-text h4 {
            color: var(--warning);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .ai-warning-text p {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* Digital Signature Keys Showcase Card */
        .keys-showcase {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        .key-text-area {
            background: #050a0b;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            font-size: 10px;
            color: var(--accent);
            word-break: break-all;
            max-height: 100px;
            overflow-y: auto;
            margin-top: 8px;
        }

        /* Responsive Layout Updates */
        @media (max-width: 900px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
            }
            .pres-form-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-section">
            <span class="logo-icon">🏥</span>
            <div class="logo-text">Med<span>Ecos</span></div>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="connection-status">
                <div class="status-indicator" id="pingStatus"></div>
                <span id="pingStatusText">Connecting to API...</span>
            </div>
            <div class="user-nav-profile" id="userNavProfile" style="display: none;">
                <span id="navUsername" style="font-weight: 600; font-size: 14px;"></span>
                <button class="logout-btn" onclick="logout()">Sign Out</button>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- 1. AUTHENTICATION CONTAINER -->
        <div id="authContainer" class="auth-card">
            <h2 class="auth-title">Welcome to MedEcos</h2>
            <p class="auth-subtitle">Unified Digital Healthcare Portal</p>

            <div class="role-tabs">
                <button class="role-tab active" onclick="switchRoleTab('Patient')">Patient</button>
                <button class="role-tab" onclick="switchRoleTab('Doctor')">Doctor</button>
                <button class="role-tab" onclick="switchRoleTab('Pharmacist')">Pharmacist</button>
                <button class="role-tab" onclick="switchRoleTab('Pathologist')">Lab Tech</button>
            </div>

            <!-- Standard Auth Form (For Doctor, Pharmacist, Pathologist) -->
            <form id="standardAuthForm" style="display: none;" onsubmit="handleStandardAuth(event)">
                <div class="form-group" id="usernameGroup">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn" id="authSubmitBtn">Sign In</button>
                <p class="auth-toggle" id="authToggleText" onclick="toggleAuthMode()">Don't have an account? Register</p>
            </form>

            <!-- ABHA Auth Form (For Patients only) -->
            <div id="abhaAuthForm">
                <div class="form-group" id="abhaInputGroup">
                    <label for="abhaId">ABHA ID (National Health ID)</label>
                    <input type="text" id="abhaId" class="form-input" placeholder="9999-8888-7777-6666" value="9999-8888-7777-6666" required>
                </div>
                <div class="form-group" id="otpInputGroup" style="display: none;">
                    <label for="otpCode">6-Digit Verification Code</label>
                    <input type="text" id="otpCode" class="form-input" placeholder="Enter OTP (Test: 123456)" required>
                </div>
                <button type="button" class="btn" id="abhaSubmitBtn" onclick="handleAbhaAuthInit()">Request OTP</button>
                <p style="text-align: center; color: var(--text-secondary); font-size: 11px; margin-top: 16px;">
                    Use mock ABHA flow to connect directly to the government integration simulator.
                </p>
            </div>
        </div>

        <!-- 2. DASHBOARD CONTAINER -->
        <div id="dashboardContainer" class="dashboard-layout" style="display: none;">
            
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-user">
                    <span class="sidebar-user-name" id="sidebarUserName">User</span>
                    <span class="sidebar-user-role" id="sidebarUserRole">Role</span>
                </div>
                <div id="sidebarMenu">
                    <!-- Dynamic Menu Items based on role -->
                </div>
            </div>

            <!-- Main Panel -->
            <div class="dashboard-panel" id="dashboardPanel">
                <!-- Dynamic Content Panel -->
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon" id="toastIcon">ℹ️</span>
        <span id="toastText">Message goes here</span>
    </div>

    <script>
        // Global State variables
        let appState = {
            currentRole: 'Patient', // Patient, Doctor, Pharmacist, Pathologist
            authMode: 'login', // login, register (for standard auth)
            user: null,
            token: null,
            abhaTransactionId: null,
            prescriptionMedicines: [], // For Doctor Builder
            selectedMenu: 'dashboard',
            mockLabOrders: [] // Simulated pathologist tests
        };

        const BASE_API = window.location.origin;

        // Verify Backend Connection Status
        async function checkConnection() {
            const indicator = document.getElementById('pingStatus');
            const text = document.getElementById('pingStatusText');
            try {
                const res = await fetch(`${BASE_API}/api/test/public`);
                if (res.ok) {
                    indicator.className = 'status-indicator online';
                    text.textContent = 'API Connection Secure';
                } else {
                    indicator.className = 'status-indicator';
                    text.textContent = 'API Error';
                }
            } catch (e) {
                indicator.className = 'status-indicator';
                text.textContent = 'Backend Offline';
            }
        }

        // Initialize App
        window.addEventListener('DOMContentLoaded', () => {
            checkConnection();
            setInterval(checkConnection, 15000);

            // Load session if exists
            const savedToken = localStorage.getItem('token');
            const savedUser = localStorage.getItem('user');

            if (savedToken && savedUser) {
                appState.token = savedToken;
                appState.user = JSON.parse(savedUser);
                appState.currentRole = appState.user.role;
                showDashboard();
            } else {
                switchRoleTab('Patient');
            }
        });

        // Toast message display
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const text = document.getElementById('toastText');

            text.textContent = message;
            if (type === 'success') {
                icon.textContent = '✅';
                toast.style.borderColor = 'var(--success)';
            } else if (type === 'error') {
                icon.textContent = '❌';
                toast.style.borderColor = 'var(--error)';
            } else if (type === 'warning') {
                icon.textContent = '⚠️';
                toast.style.borderColor = 'var(--warning)';
            } else {
                icon.textContent = 'ℹ️';
                toast.style.borderColor = 'var(--border-color)';
            }

            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        // Switch role tabs on auth page
        function switchRoleTab(role) {
            appState.currentRole = role;
            
            // Highlight active tab
            document.querySelectorAll('.role-tab').forEach(tab => {
                tab.classList.toggle('active', tab.textContent.includes(role === 'Pathologist' ? 'Lab Tech' : role));
            });

            // Toggle forms
            const standardForm = document.getElementById('standardAuthForm');
            const abhaForm = document.getElementById('abhaAuthForm');

            if (role === 'Patient') {
                standardForm.style.display = 'none';
                abhaForm.style.display = 'block';
                // Reset ABHA states
                document.getElementById('otpInputGroup').style.display = 'none';
                document.getElementById('abhaInputGroup').style.display = 'block';
                document.getElementById('abhaSubmitBtn').textContent = 'Request OTP';
                document.getElementById('abhaSubmitBtn').setAttribute('onclick', 'handleAbhaAuthInit()');
            } else {
                standardForm.style.display = 'block';
                abhaForm.style.display = 'none';
                appState.authMode = 'login';
                updateStandardAuthUI();
            }
        }

        // Toggle Login vs Register mode
        function toggleAuthMode() {
            appState.authMode = (appState.authMode === 'login') ? 'register' : 'login';
            updateStandardAuthUI();
        }

        function updateStandardAuthUI() {
            const submitBtn = document.getElementById('authSubmitBtn');
            const toggleText = document.getElementById('authToggleText');
            const usernameGroup = document.getElementById('usernameGroup');

            if (appState.authMode === 'login') {
                submitBtn.textContent = 'Sign In';
                toggleText.textContent = "Don't have an account? Register";
                usernameGroup.style.display = 'none';
                document.getElementById('username').required = false;
            } else {
                submitBtn.textContent = 'Create ' + appState.currentRole + ' Account';
                toggleText.textContent = "Already have an account? Login";
                usernameGroup.style.display = 'block';
                document.getElementById('username').required = true;
            }
        }

        // Handle standard sign-in/register (Doctor, Pharmacist, Pathologist)
        async function handleStandardAuth(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value;

            const endpoint = appState.authMode === 'login' ? '/api/auth/login' : '/api/auth/register';
            const body = appState.authMode === 'login' 
                ? { email, password } 
                : { username, email, password, role: appState.currentRole };

            try {
                const res = await fetch(`${BASE_API}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.message || 'Authentication failed');
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify({
                    _id: data._id || data.id,
                    username: data.username,
                    email: data.email,
                    role: data.role || appState.currentRole
                }));

                appState.token = data.token;
                appState.user = JSON.parse(localStorage.getItem('user'));
                
                showToast(appState.authMode === 'login' ? 'Successfully logged in!' : 'Account registered successfully!', 'success');
                showDashboard();

            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // Handle ABHA OTP Generation
        async function handleAbhaAuthInit() {
            const abhaId = document.getElementById('abhaId').value;
            if (!abhaId) {
                showToast('ABHA ID is required', 'warning');
                return;
            }

            try {
                const res = await fetch(`${BASE_API}/api/auth/abha/generate-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ abhaId })
                });

                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.message || 'OTP generation failed');
                }

                appState.abhaTransactionId = data.transactionId;
                showToast('Mock OTP requested successfully. Try 123456.', 'success');

                // Shift fields to OTP Verification stage
                document.getElementById('abhaInputGroup').style.display = 'none';
                document.getElementById('otpInputGroup').style.display = 'block';
                
                const submitBtn = document.getElementById('abhaSubmitBtn');
                submitBtn.textContent = 'Verify OTP & Login';
                submitBtn.setAttribute('onclick', 'handleAbhaAuthVerify()');

            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // Handle ABHA OTP Verification & Login
        async function handleAbhaAuthVerify() {
            const abhaId = document.getElementById('abhaId').value;
            const otp = document.getElementById('otpCode').value;

            if (!otp) {
                showToast('OTP code is required', 'warning');
                return;
            }

            try {
                const res = await fetch(`${BASE_API}/api/auth/abha/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        transactionId: appState.abhaTransactionId,
                        otp: otp,
                        abhaId: abhaId
                    })
                });

                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.message || 'OTP Verification failed');
                }

                // Cache credentials
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify({
                    _id: data._id || data.id,
                    username: data.username || 'Patient ' + data.abhaId,
                    role: data.role || 'Patient',
                    abhaId: data.abhaId
                }));

                appState.token = data.token;
                appState.user = JSON.parse(localStorage.getItem('user'));
                appState.currentRole = 'Patient';

                showToast('Welcome, ABHA Patient!', 'success');
                showDashboard();

            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // Render Dashboard UI
        function showDashboard() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('dashboardContainer').style.display = 'grid';
            document.getElementById('userNavProfile').style.display = 'flex';
            document.getElementById('navUsername').textContent = `${appState.user.username} (${appState.currentRole})`;

            document.getElementById('sidebarUserName').textContent = appState.user.username;
            document.getElementById('sidebarUserRole').textContent = appState.currentRole;

            buildSidebarMenu();
            renderMenuContent('dashboard');
        }

        // Build Role-Based Sidebar Navigation
        function buildSidebarMenu() {
            const menu = document.getElementById('sidebarMenu');
            menu.innerHTML = '';

            const items = {
                Patient: [
                    { id: 'dashboard', label: '🏠 Dashboard / QR', icon: '🏠' },
                    { id: 'prescriptions', label: '📋 My History', icon: '📋' }
                ],
                Doctor: [
                    { id: 'dashboard', label: '📊 Dashboard', icon: '📊' },
                    { id: 'new-prescription', label: '✍️ Consult / Prescribe', icon: '✍️' },
                    { id: 'patient-history', label: '📁 Patient Records', icon: '📁' },
                    { id: 'keys', label: '🔑 Digital Keys', icon: '🔑' }
                ],
                Pharmacist: [
                    { id: 'dashboard', label: '💊 Dashboard', icon: '💊' },
                    { id: 'dispense', label: '📷 Scan & Dispense', icon: '📷' }
                ],
                Pathologist: [
                    { id: 'dashboard', label: '🔬 Lab Orders', icon: '🔬' }
                ]
            };

            const roleMenu = items[appState.currentRole] || [];
            roleMenu.forEach(item => {
                const div = document.createElement('div');
                div.className = `sidebar-menu-item ${appState.selectedMenu === item.id ? 'active' : ''}`;
                div.innerHTML = `${item.label}`;
                div.onclick = () => {
                    document.querySelectorAll('.sidebar-menu-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    renderMenuContent(item.id);
                };
                menu.appendChild(div);
            });
        }

        // Render Menu Content Panels
        function renderMenuContent(menuId) {
            appState.selectedMenu = menuId;
            const panel = document.getElementById('dashboardPanel');
            panel.innerHTML = '';

            // ── ROLE: PATIENT ──

                                    <span>Gender: <strong>Male</strong></span>
                                    <span>Age: <strong>24</strong></span>
                                </div>
                            </div>
                        </div>

                } else if (menuId === 'prescriptions') {
                    panel.innerHTML = `

                } else if (menuId === 'new-prescription') {

                } else if (menuId === 'patient-history') {

                        </div>
                        <div class="timeline" id="pharmacyPrescriptionsArea" style="display:none;">
                            <!-- Prescriptions verified and listed here -->
                        </div>
                    `;
                }
            }

            // ── ROLE: PATHOLOGIST ──
            else if (appState.currentRole === 'Pathologist') {
                if (menuId === 'dashboard') {
                    panel.innerHTML = `
                        <div class="panel-header">
                            <h3 class="panel-title">Lab Diagnostics Dashboard</h3>
                            <button class="btn" style="width:auto; padding:8px 16px;" onclick="loadLabOrders()">🔄 Refresh Orders</button>
                        </div>
                        <div class="lab-board" id="labOrdersBoard">
                            <p style="color:var(--text-secondary); text-align:center;">Loading pending lab orders...</p>
                        </div>
                    `;
                    loadLabOrders();
                }
            }
        }

        // Navigate menu helper
        function navigateToMenu(menuId) {
            const sidebarItems = document.querySelectorAll('.sidebar-menu-item');
            sidebarItems.forEach(el => {
                if (el.textContent.toLowerCase().includes(menuId.replace('-', ' '))) {
                    el.click();
                }
            });
            renderMenuContent(menuId);
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            appState.token = null;
            appState.user = null;
            
            document.getElementById('authContainer').style.display = 'block';
            document.getElementById('dashboardContainer').style.display = 'none';
            document.getElementById('userNavProfile').style.display = 'none';
            
            showToast('Signed out successfully.', 'info');
            switchRoleTab('Patient');
        }

        // ── API INTEGRATION LOGIC ──

        // 1. Patient App: Load timeline
        async function loadPatientPrescriptions() {
            const timeline = document.getElementById('patientTimeline');
            try {
                const res = await fetch(`${BASE_API}/api/v1/patient/prescriptions`, {
                    headers: { 'Authorization': `Bearer ${appState.token}` }
                });

                if (!res.ok) throw new Error('Failed to load prescriptions');
                const data = await res.json();
                
                if (!data.records || data.records.length === 0) {
                    timeline.innerHTML = `
                        <p style="color:var(--text-secondary); text-align:center; padding:32px 0;">No prescription history found on ABHA ID.</p>
                    `;
                    return;
                }

                timeline.innerHTML = '';
                data.records.forEach(rx => {
                    const dateStr = new Date(rx.date).toLocaleDateString('en-IN', {
                        day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
                    });

                    const medicinesHTML = rx.fullMedicines.map(m => `
                        <div class="med-tag">
                            💊 ${m.name} 
                            <span class="freq">${m.frequency || 'N/A'}</span>
                            <span class="duration">${m.duration || 'N/A'}</span>
                        </div>
                    `).join('');

                    const labHTML = (rx.labTests && rx.labTests.length > 0) 
                        ? `<div class="tests-row">${rx.labTests.map(t => `<span class="test-tag">🔬 ${t}</span>`).join('')}</div>`
                        : '';

                    timeline.innerHTML += `
                        <div class="timeline-item">
                            <div class="timeline-date">${dateStr}</div>
                            <div class="timeline-card">
                                <div class="timeline-title">
                                    <span>Diagnosis: ${rx.diagnosis}</span>
                                </div>
                                <div class="timeline-doctor">Issued by: <strong>${rx.doctorName}</strong></div>
                                <div class="med-tags">${medicinesHTML}</div>
                                ${labHTML}
                                <div class="verification-bar" id="verify-bar-${rx.prescriptionId}" onclick="verifyPrescription('${rx.prescriptionId}')">
                                    <span>🔐 Click to Verify Doctor Cryptographic Signature</span>
                                    <span>Verify ✓</span>
                                </div>
                                <div class="signature-block" id="sig-block-${rx.prescriptionId}" style="display:none;"></div>
                            </div>
                        </div>
                    `;
                });

            } catch (err) {
                showToast(err.message, 'error');
                timeline.innerHTML = `<p style="color:var(--error); text-align:center;">Error: ${err.message}</p>`;
            }
        }

        // Verify cryptographic signature public endpoint
        async function verifyPrescription(prescriptionId) {
            const bar = document.getElementById(`verify-bar-${prescriptionId}`);
            const block = document.getElementById(`sig-block-${prescriptionId}`);

            try {
                const res = await fetch(`${BASE_API}/api/public/verify-prescription/${prescriptionId}`);
                if (!res.ok) throw new Error('Verification failed');

                const data = await res.json();
                
                if (data.isAuthentic) {
                    bar.className = 'verification-bar';
                    bar.style.backgroundColor = 'var(--success-glow)';
                    bar.style.color = 'var(--success)';
                    bar.style.borderColor = 'rgba(102, 187, 106, 0.2)';
                    bar.innerHTML = `<span>🛡️ Cryptographic Signature Authentic (Signed by ${data.signedBy})</span><span>Success ✓</span>`;
                } else {
                    bar.className = 'verification-bar error';
                    bar.innerHTML = `<span>⚠️ Warning: Invalid Cryptographic Signature!</span><span>Failed ❌</span>`;
                }

                // Call endpoint to get details of signature
                const rxRes = await fetch(`${BASE_API}/api/public/prescriptions/${prescriptionId}`);
                const rxData = await rxRes.json();
                
                block.style.display = 'block';
                block.innerHTML = `
                    <strong>Digital Signature (Base64 RSA-SHA256):</strong><br>${rxData.digitalSignature || 'No digital signature'}<br><br>
                    <strong>Timestamp:</strong> ${new Date(rxData.date).toISOString()}<br>
                    <strong>Signed By Doctor ID:</strong> ${rxData.doctorId}
                `;

            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // 2. Doctor: Add medicines to prescription builder
        function addMedToBuilder() {
            const nameInput = document.getElementById('builderMedName');
            const freqSelect = document.getElementById('builderMedFreq');
            const durInput = document.getElementById('builderMedDur');

            const name = nameInput.value.trim();
            const frequency = freqSelect.value;
            const duration = durInput.value.trim();

            if (!name) {
                showToast('Medicine name is required', 'warning');
                return;
            }

            appState.prescriptionMedicines.push({ name, frequency, duration });
            
            // Clear inputs
            nameInput.value = '';
            
            renderMedBuilderList();
            checkDrugClashes();
        }

        function removeMedFromBuilder(index) {
            appState.prescriptionMedicines.splice(index, 1);
            renderMedBuilderList();
            checkDrugClashes();
        }

        function renderMedBuilderList() {
            const container = document.getElementById('medBuilderList');
            if (appState.prescriptionMedicines.length === 0) {
                container.innerHTML = `<p style="color:var(--text-secondary); font-size:12px; text-align:center; padding:12px 0;">No medicines added yet. Use form above to add.</p>`;
                return;
            }

            container.innerHTML = appState.prescriptionMedicines.map((m, idx) => `
                <div class="med-builder-item">
                    <span><strong>💊 ${m.name}</strong> (${m.frequency}) — ${m.duration}</span>
                    <button class="remove-med-btn" onclick="removeMedFromBuilder(${idx})">🗑️</button>
                </div>
            `).join('');
        }

        // Gemini AI Drug Clash simulated engine
        function checkDrugClashes() {
            const clashArea = document.getElementById('geminiAIArea');
            
            // Look for clashing medicines
            const medNames = appState.prescriptionMedicines.map(m => m.name.toLowerCase());
            
            // Checks for Paracetamol + Ibuprofen OR Amoxicillin + Penicillin (clash cases)
            let clashFound = false;
            let clashDetail = '';

            if (medNames.includes('paracetamol') && medNames.includes('ibuprofen')) {
                clashFound = true;
                clashDetail = 'Double NSAIDs detected (Paracetamol + Ibuprofen). High cumulative risk of hepatic load and gastrointestinal lining degradation. Recommended action: Choose one or reduce dosage.';
            } else if (medNames.includes('amoxicillin') && medNames.includes('penicillin')) {
                clashFound = true;
                clashDetail = 'Duplicate beta-lactam antibiotics (Amoxicillin + Penicillin). Causes bacterial target saturation with zero therapeutic gain. Increases risk of acute drug allergy.';
            }

            if (clashFound) {
                clashArea.style.display = 'block';
                clashArea.innerHTML = `
                    <div class="ai-warning-box">
                        <span class="ai-warning-icon">🤖</span>
                        <div class="ai-warning-text">
                            <h4>Gemini AI — Drug Interaction Warning</h4>
                            <p>${clashDetail}</p>
                        </div>
                    </div>
                `;
            } else {
                clashArea.style.display = 'none';
                clashArea.innerHTML = '';
            }
        }

        // Doctor: Submit digital signature prescription
        async function submitDigitalPrescription() {
            const abhaId = document.getElementById('rxAbhaId').value.trim();
            const diagnosis = document.getElementById('rxDiagnosis').value.trim();
            
            if (!abhaId || !diagnosis) {
                showToast('Patient ABHA ID and Diagnosis are required', 'warning');
                return;
            }

            if (appState.prescriptionMedicines.length === 0) {
                showToast('Please prescribe at least one medicine', 'warning');
                return;
            }

            // Extract checked lab tests
            const checkedTests = [];
            document.querySelectorAll('input[name="rxLabTest"]:checked').forEach(cb => {
                checkedTests.push(cb.value);
            });

            const body = {
                abhaId,
                diagnosis,
                medicines: appState.prescriptionMedicines,
                labTests: checkedTests
            };

            try {
                const res = await fetch(`${BASE_API}/api/v1/doctor/prescriptions`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${appState.token}`
                    },
                    body: JSON.stringify(body)
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Failed to issue prescription');

                showToast('Prescription Digitally Signed and Issued!', 'success');
                
                // Clear fields
                document.getElementById('rxDiagnosis').value = '';
                document.querySelectorAll('input[name="rxLabTest"]:checked').forEach(cb => cb.checked = false);
                appState.prescriptionMedicines = [];
                renderMedBuilderList();
                document.getElementById('geminiAIArea').style.display = 'none';

                // Navigate to Patient Lookup to see it in history
                navigateToMenu('patient-history');
                document.getElementById('lookupAbhaId').value = abhaId;
                lookupPatientRecords();

            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // Doctor: Search patient details and previous prescriptions
        async function lookupPatientRecords() {
            const abhaId = document.getElementById('lookupAbhaId').value.trim();
            if (!abhaId) {
                showToast('ABHA ID is required', 'warning');
                return;
            }

            const resultsArea = document.getElementById('lookupResultsArea');
            const profileArea = document.getElementById('lookupPatientProfile');
            const timeline = document.getElementById('lookupTimeline');

            try {
                // 1. Fetch Patient profile
                const profileRes = await fetch(`${BASE_API}/api/v1/doctor/patients/${abhaId}`, {
                    headers: { 'Authorization': `Bearer ${appState.token}` }
                });

                if (profileRes.status === 404) {
                    showToast('No patient registered on this ABHA ID.', 'warning');
                    resultsArea.style.display = 'none';
                    return;
                }
                if (!profileRes.ok) throw new Error('Search failed');
                const patient = await profileRes.json();

                profileArea.innerHTML = `
                    <div class="stat-card">
                        <span class="stat-card-title">Patient Name</span>
                        <span class="stat-card-value" style="font-size: 20px;">${patient.username || 'N/A'}</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-card-title">Gender / Age</span>
                        <span class="stat-card-value" style="font-size: 20px;">${patient.gender || 'Male'} / ${patient.age || '24'} yrs</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-card-title">Linked ABHA ID</span>
                        <span class="stat-card-value" style="font-size: 16px; color:var(--accent);">${patient.abhaId}</span>
                    </div>
                `;

                // 2. Fetch history
                const histRes = await fetch(`${BASE_API}/api/v1/doctor/prescriptions/${abhaId}`, {
                    headers: { 'Authorization': `Bearer ${appState.token}` }
                });
                const prescriptions = await histRes.json();

                resultsArea.style.display = 'block';
                
                if (!prescriptions || prescriptions.length === 0) {
                    timeline.innerHTML = `<p style="color:var(--text-secondary); text-align:center; padding:20px 0;">No historic prescriptions found.</p>`;
                    return;
                }

                timeline.innerHTML = '';
                prescriptions.forEach(rx => {
                    const dateStr = new Date(rx.date).toLocaleDateString('en-IN', {
                        day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
                    });

                    const medicinesHTML = rx.medicines.map(m => `
                        <div class="med-tag">
                            💊 ${m.name} 
                            <span class="freq">${m.frequency || 'N/A'}</span>
                            <span class="duration">${m.duration || 'N/A'}</span>
                        </div>
                    `).join('');

                    const labHTML = (rx.labTests && rx.labTests.length > 0) 
                        ? `<div class="tests-row">${rx.labTests.map(t => `<span class="test-tag">🔬 ${t}</span>`).join('')}</div>`
                        : '';

                    timeline.innerHTML += `
                        <div class="timeline-item">
                            <div class="timeline-date">${dateStr}</div>
                            <div class="timeline-card">
                                <div class="timeline-title">Diagnosis: ${rx.diagnosis}</div>
                                <div class="timeline-doctor">Signed by: <strong>${rx.doctorName}</strong></div>
                                <div class="med-tags">${medicinesHTML}</div>
                                ${labHTML}
                                <div class="verification-bar" id="verify-bar-${rx._id}" onclick="verifyPrescription('${rx._id}')">
                                    <span>🔐 Click to Verify Doctor Cryptographic Signature</span>
                                    <span>Verify ✓</span>
                                </div>
                                <div class="signature-block" id="sig-block-${rx._id}" style="display:none;"></div>
                            </div>
                        </div>
                    `;
                });

            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // Doctor: Load public signature keys from profile
        async function loadDoctorKeys() {
            const keyArea = document.getElementById('doctorPublicKeyArea');
            try {
                const res = await fetch(`${BASE_API}/api/v1/patient/profile`, {
                    headers: { 'Authorization': `Bearer ${appState.token}` }
                });

                if (!res.ok) throw new Error('Failed to retrieve keys');
                const doctor = await res.json();

                if (doctor.publicKey) {
                    keyArea.textContent = doctor.publicKey;
                } else {
                    keyArea.textContent = 'Digital key pair not provisioned. Register a fresh Doctor account to auto-generate a valid RSA-2048 key pair.';
                }

            } catch (err) {
                keyArea.textContent = 'Error: ' + err.message;
            }
        }

        // 3. Pharmacist: Retrieve and Verify patient prescriptions
        async function verifyPatientRxPharmacist() {
            const abhaId = document.getElementById('pharmacyAbhaId').value.trim();
            if (!abhaId) {
                showToast('ABHA ID is required', 'warning');
                return;
            }

            const area = document.getElementById('pharmacyPrescriptionsArea');
            try {
                // Fetch public patient prescriptions route
                const res = await fetch(`${BASE_API}/api/public/prescriptions/patient/${abhaId}`);
                if (!res.ok) throw new Error('Prescription lookup failed');

                const prescriptions = await res.json();
                area.style.display = 'block';

                if (!prescriptions || prescriptions.length === 0) {
                    area.innerHTML = `<p style="color:var(--text-secondary); text-align:center; padding:32px 0;">No prescriptions found for patient.</p>`;
                    return;
                }

                area.innerHTML = '';
                prescriptions.forEach(rx => {
                    const dateStr = new Date(rx.date).toLocaleDateString('en-IN', {
                        day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
                    });

                    const medicinesHTML = rx.medicines.map(m => `
                        <div class="med-tag">
                            💊 ${m.name} 
                            <span class="freq">${m.frequency || 'N/A'}</span>
                            <span class="duration">${m.duration || 'N/A'}</span>
                        </div>
                    `).join('');

                    const labHTML = (rx.labTests && rx.labTests.length > 0) 
                        ? `<div class="tests-row">${rx.labTests.map(t => `<span class="test-tag">🔬 ${t}</span>`).join('')}</div>`
                        : '';

                    area.innerHTML += `
                        <div class="timeline-item">
                            <div class="timeline-date">${dateStr}</div>
                            <div class="timeline-card" style="border-left: 4px solid var(--accent)">
                                <div class="timeline-title" style="margin-bottom: 2px;">
                                    <span>Diagnosis: ${rx.diagnosis}</span>
                                    <button class="btn" style="width:auto; padding:6px 12px; font-size:11px;" id="dispense-btn-${rx._id}" onclick="markDispensed('${rx._id}')">Dispense meds</button>
                                </div>
                                <div class="timeline-doctor">Issued by: <strong>${rx.doctorName}</strong></div>
                                <div class="med-tags">${medicinesHTML}</div>
                                ${labHTML}
                                <div class="verification-bar" id="verify-bar-${rx._id}" onclick="verifyPrescription('${rx._id}')">
                                    <span>🔐 Click to Verify Doctor Cryptographic Signature</span>
                                    <span>Verify ✓</span>
                                </div>
                                <div class="signature-block" id="sig-block-${rx._id}" style="display:none;"></div>
                            </div>
                        </div>
                    `;

                    // Auto verify signatures in background for pharmacist convenience
                    setTimeout(() => verifyPrescription(rx._id), 100);
                });

            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        function markDispensed(rxId) {
            const btn = document.getElementById(`dispense-btn-${rxId}`);
            btn.style.backgroundColor = 'var(--success-glow)';
            btn.style.color = 'var(--success)';
            btn.style.borderColor = 'rgba(102,187,106,0.3)';
            btn.textContent = 'Dispensed ✓';
            btn.disabled = true;
            showToast('Medication logged as dispensed.', 'success');
        }

        // 4. Pathologist: Load all ordered lab tests and allow status updates
        async function loadLabOrders() {
            const board = document.getElementById('labOrdersBoard');
            try {
                // To fetch all ordered tests, we search all prescriptions from the default patient (9999-8888-7777-6666)
                // which has our test records!
                const res = await fetch(`${BASE_API}/api/public/prescriptions/patient/9999-8888-7777-6666`);
                if (!res.ok) throw new Error('Failed to query lab orders');
                const prescriptions = await res.json();

                // Extract lab tests from prescriptions
                let orders = [];
                prescriptions.forEach(rx => {
                    if (rx.labTests && rx.labTests.length > 0) {
                        rx.labTests.forEach(test => {
                            orders.push({
                                id: rx._id + '-' + test.replace(/\s+/g, '-'),
                                rxId: rx._id,
                                testName: test,
                                patientName: 'John Doe (' + rx.abhaId + ')',
                                doctorName: rx.doctorName,
                                date: rx.date,
                                status: getSavedLabStatus(rx._id + '-' + test.replace(/\s+/g, '-')) // Get status from mock localState
                            });
                        });
                    }
                });

                if (orders.length === 0) {
                    board.innerHTML = `<p style="color:var(--text-secondary); text-align:center; padding:32px 0;">No active lab orders found in ecosystem.</p>`;
                    return;
                }

                board.innerHTML = '';
                orders.forEach(order => {
                    const statusClass = order.status.replace(/\s+/g, '').toLowerCase(); // pending, inprogress, completed
                    
                    const actionsHTML = order.status !== 'completed' ? `
                        <div class="lab-actions">
                            ${order.status === 'pending' ? `<button class="lab-btn" onclick="updateLabStatus('${order.id}', 'inprogress')">Start Test</button>` : ''}
                            ${order.status === 'inprogress' ? `<button class="lab-btn" style="background:var(--teal)" onclick="updateLabStatus('${order.id}', 'completed')">Complete & Upload</button>` : ''}
                        </div>
                    ` : '';

                    board.innerHTML += `
                        <div class="lab-item" id="lab-item-${order.id}">
                            <div class="lab-item-details">
                                <span class="lab-item-title">🔬 ${order.testName}</span>
                                <span class="lab-item-meta">Patient: <strong>${order.patientName}</strong></span>
                                <span class="lab-item-meta">Ordered by: Dr. ${order.doctorName} | Date: ${new Date(order.date).toLocaleDateString()}</span>
                            </div>
                            <div style="display:flex; align-items:center; gap:20px;">
                                <span class="lab-status-badge ${statusClass}">${order.status}</span>
                                ${actionsHTML}
                            </div>
                        </div>
                    `;
                });

            } catch (err) {
                showToast(err.message, 'error');
                board.innerHTML = `<p style="color:var(--error); text-align:center;">Error: ${err.message}</p>`;
            }
        }

        // Mock state updates for lab status
        function getSavedLabStatus(orderId) {
            const saved = localStorage.getItem('lab-' + orderId);
            return saved || 'pending';
        }

        function updateLabStatus(orderId, nextStatus) {
            localStorage.setItem('lab-' + orderId, nextStatus);
            showToast(`Lab status updated to ${nextStatus}`, 'success');
            loadLabOrders();
        }

    </script>
</body>
</html>
